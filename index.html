<!DOCTYPE html>
<html>
<head>
    <meta name=""viewport" content="width=device-width, initial-scale=1.0">
    <title>FNandoDEV</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #6a0dad; /* roxo */
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .grupo {
            margin-bottom: 30px;
        }

        .titulo {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .balao {
            display: inline-block;
            background: #1f1f1f;
            padding: 12px;
            margin: 8px;
            width: 220px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* CONTATO → verde (WhatsApp vibe) */
        .contato:hover {
            background: #25D366;
            transform: scale(1.08);
        }

        /* INSTAGRAM → rosa */
        .insta:hover {
            background: #E1306C;
            transform: scale(1.08);
        }

        /* TIKTOK → azul claro */
        .tiktok:hover {
            background: #69C9D0;
            transform: scale(1.08);
        }

        /* LINKEDIN → azul */
        .linkedin:hover {
            background: #0A66C2;
            transform: scale(1.08);
        }
        
        @media (max-width: 600px) {

    body {
        padding: 15px;
    }

    h1 {
        font-size: 22px;
    }

        margin-bottom: 35px;
    }

    .balao {
        display: block;
        width: 95%;
        margin: 10px auto;
        font-size: 16px;

}
